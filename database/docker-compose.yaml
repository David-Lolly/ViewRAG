# 卷（Volumes）定义，用于数据持久化
volumes:
  postgres_data:
  minio_data:
  redis_data:

    # 服务定义
services:
  # ----------------------------------------
  # PostgreSQL 服务 (带 pgvector)
  # ----------------------------------------
  postgres:
    container_name: postgres
    image: ankane/pgvector:latest
    restart: always
    environment:
      POSTGRES_USER: viewrag
      POSTGRES_PASSWORD: viewrag123
      POSTGRES_DB: viewrag
      TZ: Asia/Shanghai
    ports:
      - "5431:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ----------------------------------------
  # MinIO 服务 (文件存储)
  # ----------------------------------------
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: viewrag
      MINIO_ROOT_PASSWORD: viewrag123
      TZ: Asia/Shanghai
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3
