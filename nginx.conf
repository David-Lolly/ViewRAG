server {
    listen 8080;
    
    # 允许上传最大 500M 文件
    client_max_body_size 500M;

    # Docker 内置 DNS，启用动态解析
    resolver 127.0.0.11 valid=10s;

    # SSE 流式端点：禁用缓冲，确保事件实时到达客户端
    # 匹配 /process（文档处理进度）和 /chat/send、/chat/regenerate（LLM流式输出）
    location ~ ^/backend/api/v1/(documents/[^/]+/process|chat/(send|regenerate)) {
        set $backend_upstream http://backend:8000;
        rewrite ^/backend/(.*)$ /$1 break;
        proxy_pass $backend_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300;
        proxy_connect_timeout 10;
        proxy_send_timeout 300;

        # SSE 专属：禁用缓冲保证实时推送
        proxy_buffering off;
        proxy_cache off;
        proxy_request_buffering off;

        proxy_intercept_errors on;
    }

    location /backend/ {
        # 变量引用：每次请求重新解析 DNS，容器重启后自动恢复
        set $backend_upstream http://backend:8000;

        rewrite ^/backend/(.*)$ /$1 break;

        proxy_pass $backend_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 300;
        proxy_connect_timeout 10;
        proxy_send_timeout 300;

        # 普通请求启用缓冲，大文件（PDF 等）下载性能更好
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 64k;
        proxy_busy_buffers_size 128k;

        proxy_cache off;
        proxy_request_buffering off;

        # 上游错误时返回 502 而非直接断连
        proxy_intercept_errors on;
    }

    location / {
        set $frontend_upstream http://frontend:3000;
        proxy_pass $frontend_upstream;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
